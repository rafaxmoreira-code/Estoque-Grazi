// ── LOGIN ──
const PWD_KEY="grazi_pwd_v1", SESSION_KEY="grazi_auth_v1", DEFAULT_PWD="GRAZI072361";
function getCurrentPwd(){return localStorage.getItem(PWD_KEY)||DEFAULT_PWD;}
function toggleLoginPwd(){const i=document.getElementById("loginPwd"),b=document.getElementById("eyeBtn");if(i.type==="password"){i.type="text";b.textContent="🙈";}else{i.type="password";b.textContent="👁️";}}
function showLogin(){document.getElementById("loginBox").style.display="block";document.getElementById("changePwdBox").style.display="none";document.getElementById("loginErr").style.display="none";}
function showChangePwd(){document.getElementById("loginBox").style.display="none";document.getElementById("changePwdBox").style.display="block";document.getElementById("cpErr").style.display="none";document.getElementById("cpOk").style.display="none";}
function doLogin(){
  const val=document.getElementById("loginPwd").value;
  if(val===getCurrentPwd()){
    sessionStorage.setItem(SESSION_KEY,"1");
    document.getElementById("loginScreen").style.display="none";
    init();
  }else{
    document.getElementById("loginErr").style.display="block";
    document.getElementById("loginPwd").value="";
    document.getElementById("loginPwd").focus();
  }
}
function doChangePwd(){
  const old=document.getElementById("cpOld").value,n1=document.getElementById("cpNew1").value,n2=document.getElementById("cpNew2").value;
  const err=document.getElementById("cpErr"),ok=document.getElementById("cpOk");
  err.style.display="none";ok.style.display="none";
  if(old!==getCurrentPwd()){err.textContent="❌ Senha atual incorreta.";err.style.display="block";return;}
  if(n1.length<4){err.textContent="❌ Mínimo 4 caracteres.";err.style.display="block";return;}
  if(n1!==n2){err.textContent="❌ Senhas não coincidem.";err.style.display="block";return;}
  localStorage.setItem(PWD_KEY,n1);ok.style.display="block";
  document.getElementById("cpOld").value="";document.getElementById("cpNew1").value="";document.getElementById("cpNew2").value="";
  setTimeout(()=>showLogin(),2000);
}
if(sessionStorage.getItem(SESSION_KEY)==="1"){
  document.getElementById("loginScreen").style.display="none";
  window._autoInit=true;
}else{setTimeout(()=>{const el=document.getElementById("loginPwd");if(el)el.focus();},200);}

async function loadFromDB(){
  setLoad("Carregando produtos...",20);
  const{data:prods,error:e1}=await db.from("products").select("*").order("id");
  if(e1)return false;
  setLoad("Carregando histórico...",60);
  const{data:movs,error:e2}=await db.from("movements").select("*").order("created_at",{ascending:false});
  if(e2)return false;
  if(prods&&prods.length>0){
    products=prods;history=movs||[];
    const lset=new Set(products.map(p=>p.line).filter(Boolean));
    allLines=[...ALL_LINES_DEFAULT,...lset].filter((v,i,a)=>a.indexOf(v)===i).sort();
    return true;
  }
  return false;
}
async function seedDB(){
  setLoad("Carregando dados pela primeira vez...",40);
  const bs=50;
  for(let i=0;i<SEED_PRODUCTS.length;i+=bs){
    await db.from("products").upsert(SEED_PRODUCTS.slice(i,i+bs),{onConflict:"id"});
    setLoad(`Produtos ${Math.min(i+bs,SEED_PRODUCTS.length)}/${SEED_PRODUCTS.length}...`,40+Math.round((i/SEED_PRODUCTS.length)*30));
  }
  setLoad("Inserindo histórico...",70);
  for(let i=0;i<SEED_HISTORY.length;i+=bs)
    await db.from("movements").upsert(SEED_HISTORY.slice(i,i+bs),{onConflict:"id"});
}
async function saveProd(p){
  await db.from("products").upsert({id:p.id,code:p.code,name:p.name,line:p.line||"",grp:grp(p),info:p.info||"",
    quantity:p.quantity,avg_cost:p.avg_cost||0,cost_price:p.cost_price||0,sale_price:p.sale_price||0,
    min_qty:p.min_qty||0,updated_at:new Date().toISOString()},{onConflict:"id"});
}
async function saveMov(m){
  await db.from("movements").insert({id:m.id,product_id:m.product_id,code:m.code,name:m.name,
    line:m.line||"",grp:grp(m),type:m.type,category:m.category||"Compra",qty:m.qty,
    unit_cost:m.unit_cost||0,total_cost:m.total_cost||0,unit_sale:m.unit_sale||null,
    total_sale:m.total_sale||null,note:m.note||"",date:m.date});
}
async function reloadProducts(){
  const{data,error}=await db.from("products").select("*").order("id");
  if(!error&&data&&data.length>0){
    products=data;
    const lset=new Set(products.map(p=>p.line).filter(Boolean));
    allLines=[...ALL_LINES_DEFAULT,...lset].filter((v,i,a)=>a.indexOf(v)===i).sort();
  }
}

function subscribeRealtime(){
  db.channel("estoque-grazi")
    .on("postgres_changes",{event:"*",schema:"public",table:"products"},pl=>{
      if(pl.eventType==="DELETE"){products=products.filter(x=>x.id!==pl.old.id);}
      else{const p=pl.new;const idx=products.findIndex(x=>x.id===p.id);if(idx>=0)products[idx]=p;else products.push(p);}
      render();
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"movements"},pl=>{
      if(pl.eventType==="INSERT"){if(!history.find(x=>x.id===pl.new.id)){history.unshift(pl.new);sortHist();}}
      if(pl.eventType==="DELETE"){history=history.filter(x=>x.id!==pl.old.id);}
      render();
    })
    .subscribe();
}
async function init(){
  try{
    setLoad("Conectando...",10);
    const has=await loadFromDB();
    if(!has){await seedDB();await loadFromDB();}
    hideLoad();render();subscribeRealtime();
  }catch(e){setLoad("Erro de conexão.",100);}
}

function triggerImport(){document.getElementById("xlsxInput").click();}
async function handleXlsx(input){
  const file=input.files[0];if(!file)return;
  toast("📥 Importando...");
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
      let np=0,nu=0,nm=0;
      function xlDate(v){if(!v)return"";if(v instanceof Date)return v.toLocaleDateString("pt-BR");const d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString("pt-BR");}
      if(wb.SheetNames.includes("Base")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Base"],{header:1,defval:""});
        for(let i=1;i<rows.length;i++){
          const r=rows[i];if(!r[0]||!r[3])continue;
          const code=String(r[2]||"").trim(),g=String(r[0]||"").trim(),name=String(r[3]||"").trim(),line=String(r[1]||"").trim(),info=String(r[4]||"").trim();
          const ex=products.find(p=>p.code===code&&grp(p)===g);
          if(!ex){const newP={id:Date.now()*1000+Math.floor(Math.random()*1000),code,name,line,grp:g,info,quantity:0,avg_cost:0,cost_price:0,sale_price:0,min_qty:0};products.push(newP);await saveProd(newP);np++;if(line&&!allLines.includes(line)){allLines.push(line);allLines.sort();}}
          else{ex.name=name;ex.line=line;ex.info=info;await saveProd(ex);nu++;}
        }
      }
      if(wb.SheetNames.includes("Entrada")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Entrada"],{header:1,defval:""});
        for(let i=1;i<rows.length;i++){
          const r=rows[i];if(!r[0])continue;
          const code=String(r[2]||"").trim(),g=String(r[0]||"").trim();
          const qty=parseFloat(r[5]||0),uc=parseFloat(r[6]||0);if(!qty)continue;
          const prod=products.find(p=>p.code===code&&grp(p)===g)||products.find(p=>p.code===code);
          if(prod){const tq=prod.quantity+qty;prod.avg_cost=R2(tq>0?((prod.quantity*(prod.avg_cost||0))+(qty*uc))/tq:uc);prod.quantity=tq;prod.cost_price=uc;await saveProd(prod);
            const m={id:Date.now()*1000+Math.floor(Math.random()*1000),product_id:prod.id,code:prod.code,name:prod.name,line:prod.line||"",grp:grp(prod),type:"entrada",category:"Compra",qty,unit_cost:R2(uc),total_cost:R2(uc*qty),unit_sale:null,total_sale:null,note:"📥 Importado",date:xlDate(r[7])};
            history.unshift(m);await saveMov(m);nm++;}
        }
      }
      if(wb.SheetNames.includes("Saida")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Saida"],{header:1,defval:""});
        for(let i=1;i<rows.length;i++){
          const r=rows[i];if(!r[0])continue;
          const code=String(r[2]||"").trim(),g=String(r[0]||"").trim();
          const qty=parseFloat(r[5]||0),us=parseFloat(r[6]||0),cat=String(r[7]||"Venda").trim();if(!qty)continue;
          const prod=products.find(p=>p.code===code&&grp(p)===g)||products.find(p=>p.code===code);
          if(prod&&prod.quantity>=qty){const uc=prod.avg_cost||0;prod.quantity=Math.max(0,prod.quantity-qty);if(us>0&&!prod.sale_price)prod.sale_price=us;await saveProd(prod);
            const m={id:Date.now()*1000+Math.floor(Math.random()*1000),product_id:prod.id,code:prod.code,name:prod.name,line:prod.line||"",grp:grp(prod),type:"saida",category:EXIT_CATS.includes(cat)?cat:"Venda",qty,unit_cost:R2(uc),total_cost:R2(uc*qty),unit_sale:us?R2(us):null,total_sale:us?R2(us*qty):null,note:"📤 Importado",date:xlDate(r[8])};
            history.unshift(m);await saveMov(m);nm++;}
        }
      }
      sortHist();input.value="";render();
      toast("✅ "+np+" novos, "+nu+" atualizados, "+nm+" movimentações!");
    }catch(err){toast("Erro: "+err.message,"err");}
  };
  reader.readAsArrayBuffer(file);
}

async function saveProduct(){
  const code=gv("f_code").trim(),name=gv("f_name").trim();
  if(!code){toast("Digite o código","err");return;}
  if(!name){toast("Digite o nome","err");return;}
  const g=gv("f_group"),newLine=gv("f_line").trim();
  if(newLine&&!allLines.includes(newLine)){allLines.push(newLine);allLines.sort();}
  const base={code,name,line:newLine,grp:g,info:gv("f_info"),min_qty:numVal("f_minQty"),cost_price:numVal("f_costPrice"),sale_price:numVal("f_salePrice")};
  if(fd.id){products=products.map(p=>p.id===fd.id?{...p,...base}:p);await saveProd(products.find(p=>p.id===fd.id));toast("Atualizado!");}
  else{
    if(products.find(p=>p.code===base.code&&grp(p)===base.grp)){toast("Código já existe!","err");return;}
    const newP={...base,id:Date.now()*1000+Math.floor(Math.random()*1000),quantity:0,avg_cost:base.cost_price||0};
    products.push(newP);await saveProd(newP);toast("Adicionado!");
    if(afterSaveCb){const cb=afterSaveCb;afterSaveCb=null;mov.productId=newP.id;cb(newP.id);go("movement");return;}
  }
  go("list");
}

function selectMovProd(){openModal(function(id){mov.productId=id;render();});}

function updatePreview(){
  const p=mov.productId?P(mov.productId):null;const el=document.getElementById("mov_preview");if(!el||!p)return;
  const qty=numVal("mov_qty");
  if(mov.type==="entrada"){const uc=numVal("mov_uc");el.innerHTML=qty&&uc?`<div style="margin-top:8px;font-size:12px;color:#EF4444;font-weight:600">💸 Total compra: R$ ${fmt(uc*qty)}</div>`:"";return;}
  const us=numVal("mov_us"),cost=p.avg_cost||0;
  if(qty&&(us||cost)){const r=us*qty,c=cost*qty,l=r-c,m=r>0?(l/r)*100:0,co=l>=0?"#10B981":"#EF4444";
    el.innerHTML=`<div style="margin-top:10px;background:#F3F4F6;border-radius:10px;padding:10px 12px">
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#6B7280">Receita</span><b>R$ ${fmt(r)}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#6B7280">CMV</span><b>R$ ${fmt(c)}</b></div>
      <div style="height:1px;background:#E5E7EB;margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700"><span style="color:${co}">Lucro</span><span style="color:${co}">R$ ${fmt(l)} (${pct(m)})</span></div></div>`;}
  else el.innerHTML="";
}
async function registerMov(){
  if(!mov.productId){toast("Selecione um produto","err");return;}
  const qty=numVal("mov_qty");if(!qty||qty<=0){toast("Quantidade inválida","err");return;}
  const p=P(mov.productId);
  if(mov.type==="saida"&&p.quantity<qty){toast("Estoque insuficiente!","err");return;}
  const uc=mov.type==="entrada"?numVal("mov_uc")||(p.cost_price||0):(p.avg_cost||0);
  const us=mov.type==="saida"?numVal("mov_us")||(p.sale_price||0):null;
  const cat=gv("mov_cat")||"Venda";const note=gv("mov_note");
  const idx=products.findIndex(x=>x.id===p.id);
  if(mov.type==="entrada"){const tq=p.quantity+qty;products[idx]={...p,quantity:tq,avg_cost:R2(tq>0?((p.quantity*(p.avg_cost||0))+(qty*uc))/tq:uc),cost_price:uc};}
  else{products[idx]={...p,quantity:Math.max(0,p.quantity-qty)};}
  await saveProd(products[idx]);
  const m={id:Date.now()*1000+Math.floor(Math.random()*1000),product_id:p.id,code:p.code,name:p.name,line:p.line||"",grp:grp(p),type:mov.type,
    category:mov.type==="saida"?cat:"Compra",qty,unit_cost:R2(uc),total_cost:R2(uc*qty),
    unit_sale:us?R2(us):null,total_sale:us?R2(us*qty):null,note,date:mov.date};
  history.unshift(m);sortHist();await saveMov(m);
  // Reload from DB to ensure all numbers are consistent
  await reloadProducts();
  toast(mov.type==="entrada"?"✅ Entrada registrada!":"✅ Saída registrada!");
  mov={productId:null,type:"entrada",exitCat:"Venda",date:todayStr()};go("list");
}

function deleteMovement(id){pendingDeleteId=id;document.getElementById("delModal").style.display="flex";}
function cancelDeleteMov(){document.getElementById("delModal").style.display="none";pendingDeleteId=null;}
async function confirmDeleteMov(){
  document.getElementById("delModal").style.display="none";
  const id=pendingDeleteId;pendingDeleteId=null;if(!id)return;
  const sid=String(id);
  const hidx=history.findIndex(x=>String(x.id)===sid);
  if(hidx===-1){toast("Não encontrada","err");return;}
  const h=history[hidx];
  const pidx=products.findIndex(p=>String(p.id)===String(h.product_id));
  if(pidx!==-1){
    const p=products[pidx];
    products[pidx]={...p,quantity:h.type==="entrada"?Math.max(0,p.quantity-h.qty):p.quantity+h.qty};
    await saveProd(products[pidx]);
  }
  history.splice(hidx,1);
  await db.from("movements").delete().eq("id",id);
  await reloadProducts();
  render();toast("✅ Removida! Estoque atualizado.");
}

// ── FILTROS ──
function filtHist(){
  return history.filter(h=>{
    if(rf.type!=="todos"&&h.type!==rf.type)return false;
    if(rf.exitCat!=="Todas"&&(h.category||"")!==rf.exitCat)return false;
    if(rf.line!=="Todas"&&(h.line||"")!==rf.line)return false;
    if(rf.group!=="Todos"&&(h.grp||"")!==rf.group)return false;
    if(rf.productId&&String(h.product_id)!==String(rf.productId))return false;
    if(rf.code&&!String(h.code||"").toLowerCase().includes(rf.code.toLowerCase()))return false;
    if(rf.dateFrom){const d=parseDate(h.date),f=parseDate(fromInputDate(rf.dateFrom));if(d&&f&&d<f)return false;}
    if(rf.dateTo){const d=parseDate(h.date),t=parseDate(fromInputDate(rf.dateTo));if(d&&t&&d>t)return false;}
    return true;
  });
}
function setRf(k,v){rf[k]=v;render();}

async function exportExcel(){
  await reloadProducts();
  const wb = XLSX.utils.book_new();

  // Sheet 1: Estoque Atual
  const estRows = [["Codigo","Grupo","Linha","Produto","Info","Custo Medio","Preco Venda","Estoque Atual","Valor em Estoque","Qtd Minima"]];
  products.forEach(p=>{
    const val = (p.quantity||0)*(p.avg_cost||0);
    estRows.push([p.code,grp(p),p.line||"",p.name,p.info||"",
      p.avg_cost||0, p.sale_price||0, p.quantity||0, val, p.min_qty||0]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(estRows);
  ws1["!cols"] = [{wch:10},{wch:8},{wch:25},{wch:35},{wch:18},{wch:13},{wch:13},{wch:13},{wch:16},{wch:11}];
  XLSX.utils.book_append_sheet(wb, ws1, "Estoque Atual");

  // Sheet 2: Entradas
  const entRows = [["Data","Codigo","Grupo","Linha","Produto","Qtd","Custo Unit.","Total Compra","Obs"]];
  history.filter(h=>h.type==="entrada").forEach(h=>{
    entRows.push([h.date,h.code,h.grp||"",h.line||"",h.name,h.qty,h.unit_cost||0,h.total_cost||0,h.note||""]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(entRows);
  ws2["!cols"] = [{wch:12},{wch:10},{wch:8},{wch:25},{wch:35},{wch:8},{wch:13},{wch:13},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, "Entradas");

  // Sheet 3: Saidas
  const saiRows = [["Data","Codigo","Grupo","Linha","Produto","Qtd","Preco Venda","Total Venda","CMV","Lucro","Margem%","Categoria","Obs"]];
  history.filter(h=>h.type==="saida").forEach(h=>{
    const lucro=(h.total_sale||0)-(h.total_cost||0);
    const marg=(h.total_sale||0)>0?lucro/(h.total_sale||0)*100:0;
    saiRows.push([h.date,h.code,h.grp||"",h.line||"",h.name,h.qty,h.unit_sale||0,h.total_sale||0,h.total_cost||0,lucro,marg.toFixed(1)+"%",h.category||"",h.note||""]);
  });
  const ws3 = XLSX.utils.aoa_to_sheet(saiRows);
  ws3["!cols"] = [{wch:12},{wch:10},{wch:8},{wch:25},{wch:35},{wch:8},{wch:13},{wch:13},{wch:13},{wch:13},{wch:9},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws3, "Saidas");

  const date = new Date().toLocaleDateString("pt-BR").split("/").join("-");
  XLSX.writeFile(wb, "Estoque_Grazi_"+date+".xlsx");
  toast("Excel exportado!");
}

async function exportPDF(){
  await reloadProducts();
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const PINK = [212,82,122], DARK = [30,27,46], GRAY = [107,114,128], GREEN=[16,185,129], RED=[239,68,68], GOLD=[201,168,76], WHITE=[255,255,255];
  const W = doc.internal.pageSize.getWidth();
  const now = new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  let y = 0;

  function addPage(){
    doc.addPage();
    y = 18;
    // header bar
    doc.setFillColor(...PINK);
    doc.rect(0,0,W,12,"F");
    doc.setFontSize(8); doc.setTextColor(...WHITE);
    doc.text("Estoque Grazi — Relatorio de Estoque", 14, 8);
    doc.text(now, W-14, 8, {align:"right"});
    y = 20;
  }

  function checkY(need=30){if(y+need>270)addPage();}

  function sectionTitle(text, color=DARK){
    checkY(16);
    doc.setFillColor(...color);
    doc.roundedRect(14, y, W-28, 10, 2, 2, "F");
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(...WHITE);
    doc.text(text, 20, y+7);
    y += 16;
  }

  function kpiRow(items){
    checkY(22);
    const colW = (W-28)/items.length;
    items.forEach(([label,value,color],i)=>{
      const x = 14 + i*colW;
      doc.setFillColor(245,245,245);
      doc.roundedRect(x, y, colW-3, 18, 2, 2, "F");
      doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(...GRAY);
      doc.text(label, x+4, y+6);
      doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(...color);
      doc.text(String(value), x+4, y+14);
    });
    y += 24;
  }

  function autoTbl(head, body, colStyles={}){
    checkY(20);
    doc.autoTable({
      startY: y,
      head: [head],
      body: body,
      margin:{left:14,right:14},
      styles:{fontSize:8, cellPadding:3, valign:"middle"},
      headStyles:{fillColor:DARK, textColor:WHITE, fontStyle:"bold", fontSize:8},
      alternateRowStyles:{fillColor:[249,249,249]},
      columnStyles: colStyles,
      didDrawPage: (d)=>{ y = d.cursor.y + 6; },
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  // ── CAPA ──
  doc.setFillColor(...PINK);
  doc.rect(0,0,W,50,"F");
  doc.setFontSize(22); doc.setFont("helvetica","bold"); doc.setTextColor(...WHITE);
  doc.text("Relatorio de Estoque", W/2, 22, {align:"center"});
  doc.setFontSize(11); doc.setFont("helvetica","normal");
  doc.text("Estoque Grazi", W/2, 32, {align:"center"});
  doc.setFontSize(9); doc.setTextColor(249,200,215);
  doc.text("Gerado em "+now, W/2, 40, {align:"center"});
  y = 62;

  // KPIs gerais
  const totI = products.reduce((s,p)=>s+(p.quantity||0),0);
  const totV = products.reduce((s,p)=>s+(p.quantity||0)*(p.avg_cost||0),0);
  const allSai = history.filter(h=>h.type==="saida");
  const allEnt = history.filter(h=>h.type==="entrada");
  const totRec = allSai.reduce((s,h)=>s+(h.total_sale||0),0);
  const totCMV = allSai.reduce((s,h)=>s+(h.total_cost||0),0);
  const totLuc = totRec - totCMV;
  const marg = totRec>0?(totLuc/totRec*100):0;
  const totComp = allEnt.reduce((s,h)=>s+(h.total_cost||0),0);

  kpiRow([
    ["Total Produtos", products.length, DARK],
    ["Total Itens", totI, DARK],
    ["Valor em Estoque", "R$ "+fmt(totV), GOLD],
  ]);
  kpiRow([
    ["Receita Total", "R$ "+fmt(totRec), GREEN],
    ["Lucro Total", "R$ "+fmt(totLuc), GREEN],
    ["Margem Bruta", pct(marg), marg>=30?GREEN:RED],
  ]);
  kpiRow([
    ["Total Compras", "R$ "+fmt(totComp), DARK],
    ["Entradas (mov)", allEnt.length, DARK],
    ["Saidas (mov)", allSai.length, DARK],
  ]);

  // TOP 10 MAIOR ESTOQUE QTD
  sectionTitle("Top 10 — Maiores Estoques em Quantidade");
  const byQty = [...products].filter(p=>p.quantity>0).sort((a,b)=>b.quantity-a.quantity).slice(0,10);
  autoTbl(
    ["#","Codigo","Produto","Grupo","Linha","Qtd"],
    byQty.map((p,i)=>["#"+(i+1), p.code, p.name, grp(p), p.line||"—", p.quantity]),
    {0:{cellWidth:12},1:{cellWidth:18},2:{cellWidth:56},3:{cellWidth:16},4:{cellWidth:33},5:{cellWidth:14,halign:"right"}}
  );

  // TOP 10 MAIOR ESTOQUE VALOR
  sectionTitle("Top 10 — Maiores Estoques em Valor (R$)");
  const byVal = [...products].filter(p=>p.quantity>0).sort((a,b)=>(b.quantity*(b.avg_cost||0))-(a.quantity*(a.avg_cost||0))).slice(0,10);
  autoTbl(
    ["#","Codigo","Produto","Grupo","Qtd","Custo Med.","Valor Total"],
    byVal.map((p,i)=>["#"+(i+1), p.code, p.name, grp(p), p.quantity, "R$ "+fmt(p.avg_cost||0), "R$ "+fmt(p.quantity*(p.avg_cost||0))]),
    {0:{cellWidth:12},1:{cellWidth:16},2:{cellWidth:50},3:{cellWidth:14},4:{cellWidth:12,halign:"right"},5:{cellWidth:22,halign:"right"},6:{cellWidth:23,halign:"right"}}
  );

  // TOP 10 MENOR ESTOQUE QTD
  sectionTitle("Top 10 — Menores Estoques em Quantidade", [180,50,50]);
  const byQtyAsc = [...products].filter(p=>p.code).sort((a,b)=>a.quantity-b.quantity).slice(0,10);
  autoTbl(
    ["#","Codigo","Produto","Grupo","Linha","Qtd"],
    byQtyAsc.map((p,i)=>["#"+(i+1), p.code, p.name, grp(p), p.line||"—", p.quantity]),
    {0:{cellWidth:12},1:{cellWidth:18},2:{cellWidth:56},3:{cellWidth:16},4:{cellWidth:33},5:{cellWidth:14,halign:"right"}}
  );

  // TOP 10 MENOR ESTOQUE VALOR
  sectionTitle("Top 10 — Menores Estoques em Valor (R$)", [180,50,50]);
  const byValAsc = [...products].filter(p=>p.code).sort((a,b)=>(a.quantity*(a.avg_cost||0))-(b.quantity*(b.avg_cost||0))).slice(0,10);
  autoTbl(
    ["#","Codigo","Produto","Grupo","Qtd","Custo Med.","Valor Total"],
    byValAsc.map((p,i)=>["#"+(i+1), p.code, p.name, grp(p), p.quantity, "R$ "+fmt(p.avg_cost||0), "R$ "+fmt(p.quantity*(p.avg_cost||0))]),
    {0:{cellWidth:12},1:{cellWidth:16},2:{cellWidth:50},3:{cellWidth:14},4:{cellWidth:12,halign:"right"},5:{cellWidth:22,halign:"right"},6:{cellWidth:23,halign:"right"}}
  );

  // TOP 10 PRODUTOS MAIS LUCRATIVOS
  sectionTitle("Top 10 — Produtos Mais Lucrativos", [16,100,80]);
  const byProd={};
  allSai.forEach(h=>{
    if(!byProd[h.product_id])byProd[h.product_id]={name:h.name,code:h.code,grp:h.grp||"",r:0,c:0,q:0};
    byProd[h.product_id].r+=(h.total_sale||0);
    byProd[h.product_id].c+=(h.total_cost||0);
    byProd[h.product_id].q+=h.qty;
  });
  const rank=Object.values(byProd).map(p=>({...p,lucro:p.r-p.c,marg:p.r>0?(p.r-p.c)/p.r*100:0})).sort((a,b)=>b.lucro-a.lucro).slice(0,10);
  autoTbl(
    ["#","Cod.","Produto","Grp","Qtd","Receita","CMV","Lucro","Marg."],
    rank.map((p,i)=>["#"+(i+1),p.code,p.name,p.grp,p.q,"R$ "+fmt(p.r),"R$ "+fmt(p.c),"R$ "+fmt(p.lucro),p.marg.toFixed(1)+"%"]),
    {0:{cellWidth:12},1:{cellWidth:14},2:{cellWidth:48},3:{cellWidth:10},4:{cellWidth:10,halign:"right"},5:{cellWidth:22,halign:"right"},6:{cellWidth:20,halign:"right"},7:{cellWidth:20,halign:"right"},8:{cellWidth:13,halign:"right"}}
  );

  // ESTOQUE COMPLETO
  sectionTitle("Relacao Completa do Estoque");
  autoTbl(
    ["Codigo","Produto","Grupo","Linha","Custo Med.","Pr. Venda","Qtd","Valor Est."],
    products.filter(p=>p.code).map(p=>[p.code,p.name,grp(p),p.line||"","R$ "+fmt(p.avg_cost||0),"R$ "+fmt(p.sale_price||0),p.quantity,"R$ "+fmt((p.quantity||0)*(p.avg_cost||0))]),
    {0:{cellWidth:14},1:{cellWidth:52},2:{cellWidth:12},3:{cellWidth:28},4:{cellWidth:20,halign:"right"},5:{cellWidth:18,halign:"right"},6:{cellWidth:10,halign:"right"},7:{cellWidth:20,halign:"right"}}
  );

  const date = new Date().toLocaleDateString("pt-BR").split("/").join("-");
  doc.save("Relatorio_Grazi_"+date+".pdf");
  toast("PDF exportado!");
}

function buildReport(){
  const fh=filtHist();const sai=fh.filter(h=>h.type==="saida"),ent=fh.filter(h=>h.type==="entrada");
  const totR=sai.reduce((s,h)=>s+(h.total_sale||0),0),totC=sai.reduce((s,h)=>s+(h.total_cost||0),0);
  const totComp=ent.reduce((s,h)=>s+(h.total_cost||0),0);
  const lucro=totR-totC,marg=totR>0?(lucro/totR)*100:0;
  const totEst=products.reduce((s,p)=>s+p.quantity*(p.avg_cost||0),0);
  const byP={};sai.forEach(h=>{if(!byP[h.product_id])byP[h.product_id]={name:h.name,code:h.code,grp:h.grp||"",r:0,c:0,q:0};byP[h.product_id].r+=(h.total_sale||0);byP[h.product_id].c+=(h.total_cost||0);byP[h.product_id].q+=h.qty;});
  const rank=Object.values(byP).map(p=>({...p,lucro:p.r-p.c,marg:p.r>0?((p.r-p.c)/p.r)*100:0})).sort((a,b)=>b.lucro-a.lucro);
  const byCat={};sai.forEach(h=>{const c=h.category||"Venda";if(!byCat[c])byCat[c]={r:0,c:0,q:0};byCat[c].r+=(h.total_sale||0);byCat[c].c+=(h.total_cost||0);byCat[c].q+=h.qty;});

  function topByCat(cat){
    const acc={};
    sai.filter(h=>h.category===cat).forEach(h=>{
      if(!acc[h.product_id])acc[h.product_id]={name:h.name,code:h.code,grp:h.grp||"",q:0,r:0};
      acc[h.product_id].q+=h.qty; acc[h.product_id].r+=(h.total_sale||0);
    });
    return Object.values(acc).sort((a,b)=>b.q-a.q).slice(0,10);
  }

  function catSection(cat){
    const items=topByCat(cat);
    const empty=`<div class="card" style="text-align:center;color:${C.gray};font-size:13px;padding:16px">Ainda nao ha registros de saidas em ${cat}</div>`;
    const rows=items.map((p,i)=>`<div class="card"><div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:15px;font-weight:800;color:${i===0?C.gold:C.gray};min-width:24px">#${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
        <div style="font-size:11px;color:${C.gray}">[${p.code}] · ${p.grp}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:800;color:${C.pink}">${p.q} un</div>
        ${p.r>0?`<div style="font-size:11px;color:${C.green}">R$ ${fmt(p.r)}</div>`:""}
      </div>
    </div></div>`).join("");
    return `<div style="font-size:11px;font-weight:700;color:${C.gray};text-transform:uppercase;margin:18px 14px 4px">Top 10 por Categoria — ${cat}</div>${items.length===0?empty:rows}`;
  }

  return`
  <div style="display:flex;gap:8px;margin:12px 14px 0">
    <button onclick="exportPDF()" style="flex:1;background:linear-gradient(135deg,${C.pink},${C.pinkD});color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer">Exportar PDF</button>
    <button onclick="exportExcel()" style="flex:1;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer">Exportar Excel</button>
  </div>
  ${filterBar()}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 14px 0">
    ${kpi(C.greenL,C.green,"R$ "+fmt(totR),C.green,"Receita bruta")}${kpi(C.redL,C.red,"R$ "+fmt(totC),C.red,"CMV")}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 14px 0">
    ${kpi(lucro>=0?C.greenL:C.redL,lucro>=0?C.green:C.red,"R$ "+fmt(lucro),lucro>=0?C.green:C.red,"Lucro bruto")}${kpi(marg>=30?C.greenL:C.redL,marg>=30?C.green:C.red,pct(marg),marg>=30?C.green:C.red,"Margem bruta")}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 14px 0">
    ${kpi(C.blueL,C.blue,"R$ "+fmt(totComp),C.blue,"Total compras")}${kpi(C.goldL,C.gold,"R$ "+fmt(totEst),C.gold,"Estoque (custo)")}
  </div>
  ${Object.keys(byCat).length>0?`<div style="font-size:11px;font-weight:700;color:${C.gray};text-transform:uppercase;margin:18px 14px 4px">Por categoria</div>
    ${Object.entries(byCat).map(([cat,d])=>`<div class="card"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-size:14px;font-weight:700">${cat}</div><div style="font-size:12px;color:${C.gray}">${d.q} itens · CMV: R$ ${fmt(d.c)}</div></div><div style="font-size:15px;font-weight:800;color:${C.green}">R$ ${fmt(d.r)}</div></div></div>`).join("")}`:""}
  <div style="font-size:11px;font-weight:700;color:${C.gray};text-transform:uppercase;margin:18px 14px 4px">Top 10 Produtos Mais Lucrativos</div>
  ${rank.length===0
    ? `<div class="card" style="text-align:center;color:${C.gray};font-size:13px;padding:20px">Ainda nao ha registros de saidas</div>`
    : rank.slice(0,10).map((p,i)=>`<div class="card"><div style="display:flex;align-items:center;gap:8px"><div style="font-size:15px;font-weight:800;color:${i===0?C.gold:C.gray};min-width:24px">#${i+1}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div><div style="font-size:11px;color:${C.gray}">[${p.code}] · ${p.grp} · ${p.q} vendidos</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:${p.lucro>=0?C.green:C.red}">R$ ${fmt(p.lucro)}</div>${badge(p.marg)}</div></div></div>`).join("")
  }
  ${catSection("Venda")}
  ${catSection("Perdas")}
  ${catSection("Amostras")}
  ${catSection("Brindes")}
  `;
}


function buildHistory(){
  const fh=filtHist();
  return`${filterBar()}
  ${fh.length===0?`<div class="card" style="text-align:center;color:${C.gray};font-size:13px;padding:20px">Nenhuma movimentação encontrada</div>`:""}
  ${fh.map(h=>`<div class="card">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:17px">${h.type==="entrada"?"📥":"📤"}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.name}</div>
        <div style="font-size:11px;color:${C.gray}">${h.date} · [${h.code}] · ${h.grp||""}${h.category?" · "+h.category:""}</div>
        ${h.note?`<div style="font-size:11px;color:${C.gray};font-style:italic">${h.note}</div>`:""}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <div style="font-size:14px;font-weight:800;color:${h.type==="entrada"?C.green:C.pink}">${h.type==="entrada"?"+":"-"}${h.qty}</div>
        <button data-delid="${h.id}" onclick="deleteMovement(this.dataset.delid)" style="background:${C.redL};border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;color:${C.red};font-weight:600">🗑️ Remover</button>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid ${C.border};flex-wrap:wrap">
      ${h.type==="entrada"
        ?`<span style="font-size:12px"><span style="color:${C.gray}">Custo unit.:</span> <b>R$ ${fmt(h.unit_cost||0)}</b></span><span style="font-size:12px"><span style="color:${C.gray}">Total:</span> <b style="color:${C.red}">R$ ${fmt(h.total_cost||0)}</b></span>`
        :`<span style="font-size:12px"><span style="color:${C.gray}">CMV:</span> <b>R$ ${fmt(h.total_cost||0)}</b></span>${(h.total_sale)?`<span style="font-size:12px"><span style="color:${C.gray}">Venda:</span> <b style="color:${C.green}">R$ ${fmt(h.total_sale)}</b></span><span style="font-size:12px"><span style="color:${C.gray}">Lucro:</span> <b style="color:${((h.total_sale||0)-(h.total_cost||0))>=0?C.green:C.red}">R$ ${fmt((h.total_sale||0)-(h.total_cost||0))}</b></span>`:""}`}
    </div>
  </div>`).join("")}`;
}
</script>
</body>
</html>
